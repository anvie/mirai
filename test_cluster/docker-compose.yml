version: '3.8'

services:
  alpha:
    image: elixir:1.16
    container_name: mirai_alpha
    hostname: alpha
    stdin_open: true
    tty: true
    volumes:
      - ../:/app
      - ./config_alpha.yaml:/app/config_alpha.yaml
      - alpha_build:/app/_build
    working_dir: /app
    ports:
      - "4001:4001"
    environment:
      - MIX_ENV=prod
      - MIRAI_CONFIG_PATH=/app/config_alpha.yaml
    command: >
      sh -c "mix local.hex --force &&
             mix local.rebar --force &&
             mix deps.get &&
             elixir --sname mirai@alpha --cookie mirai_cluster_test -S mix run --no-halt"

  beta:
    image: elixir:1.16
    container_name: mirai_beta
    hostname: beta
    stdin_open: true
    tty: true
    volumes:
      - ../:/app
      - ./config_beta.yaml:/app/config_beta.yaml
      - beta_build:/app/_build
    working_dir: /app
    ports:
      - "4002:4002"
    environment:
      - MIX_ENV=prod
      - MIRAI_CONFIG_PATH=/app/config_beta.yaml
    command: >
      sh -c "mix local.hex --force &&
             mix local.rebar --force &&
             mix deps.get &&
             elixir --sname mirai@beta --cookie mirai_cluster_test -S mix run --no-halt"

volumes:
  alpha_build:
  beta_build:
