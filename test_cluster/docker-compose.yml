version: '3.8'

services:
  alpha:
    image: elixir:1.16
    container_name: mirai_alpha
    hostname: alpha
    stdin_open: true
    tty: true
    volumes:
      - ../:/app
      - ./config_alpha.yaml:/app/config_alpha.yaml
    working_dir: /app
    ports:
      - "4001:4001"
    environment:
      - MIX_ENV=dev
      - MIRAI_CONFIG_PATH=/app/config_alpha.yaml
      - ERL_FLAGS=-name mirai@alpha -setcookie mirai_cluster_test
    command: >
      sh -c "mix local.hex --force &&
             mix local.rebar --force &&
             mix deps.get &&
             elixir --name mirai@alpha --cookie mirai_cluster_test -S mix run --no-halt"

  beta:
    image: elixir:1.16
    container_name: mirai_beta
    hostname: beta
    stdin_open: true
    tty: true
    volumes:
      - ../:/app
      - ./config_beta.yaml:/app/config_beta.yaml
    working_dir: /app
    ports:
      - "4002:4002"
    environment:
      - MIX_ENV=dev
      - MIRAI_CONFIG_PATH=/app/config_beta.yaml
      - ERL_FLAGS=-name mirai@beta -setcookie mirai_cluster_test
    command: >
      sh -c "mix local.hex --force &&
             mix local.rebar --force &&
             mix deps.get &&
             elixir --name mirai@beta --cookie mirai_cluster_test -S mix run --no-halt"
